# Upstream rust/ carries pre-existing clippy/fmt findings this fork does not
# fix. Scope to the rust source tree so unrelated PRs (e.g. the experiments
# harness) are not gated by that debt.
on:
  push:
    branches: [ main ]
    paths:
      - 'rust/**'
  pull_request:
    branches: [ main, refacto ]
    paths:
      - 'rust/**'

name: Rust CI

jobs:
  check:
    name: Check
    defaults:
      run:
        working-directory: ./rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v2
      - uses: ./.github/actions/rust_build
      - name: check
        shell: bash
        run: |
          cargo check
      - name: clippy
        shell: bash
        run: |
          cargo clippy -- -D warnings
      - name: fmt
        shell: bash
        run: |
          cargo fmt --all -- --check
  test:
    name: Test
    defaults:
      run:
        working-directory: ./rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - uses: ./.github/actions/rust_build
        with:
          target: test
      - name: test
        shell: bash
        run: |
          cargo test
