name: precommit
on:
  push:
    branches: [ main ]
    paths:
      - 'moshi/**'
      - 'moshi_mlx/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/precommit.yml'
      - '.github/actions/moshi_build/**'
      - 'scripts/run_ci_when_installed.sh'
  pull_request:
    branches: [ main, refacto ]
    paths:
      - 'moshi/**'
      - 'moshi_mlx/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/precommit.yml'
      - '.github/actions/moshi_build/**'
      - 'scripts/run_ci_when_installed.sh'

jobs:
  run_precommit:
    name: Run precommit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ./.github/actions/moshi_build
      - run: |
          . env/bin/activate
          bash .git/hooks/pre-commit
