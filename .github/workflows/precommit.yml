name: precommit
# Upstream moshi/moshi_mlx carry pre-existing flake8/pyright findings this fork
# does not fix. Scope to the linted source dirs so unrelated PRs (e.g. the
# experiments harness) are not gated by that debt.
on:
  push:
    branches: [ main ]
    paths:
      - 'moshi/**'
      - 'moshi_mlx/**'
  pull_request:
    branches: [ main, refacto ]
    paths:
      - 'moshi/**'
      - 'moshi_mlx/**'

jobs:
  run_precommit:
    name: Run precommit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ./.github/actions/moshi_build
      - run: |
          . env/bin/activate
          bash .git/hooks/pre-commit
